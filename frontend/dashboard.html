<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <span class="leaf-icon">🍃</span> 
                <span class="logo-text">EcoData</span>
            </div>
           <ul class="nav-links">
                <li>
                    <a href="home.html" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        Home
                    </a>
                </li>
                
                <li>
                    <a href="dashboard.html" class="nav-item active">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        Dashboard
                    </a>
                </li>
                
                <li>
                    <a href="analysis.html" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                            <polyline points="16 7 22 7 22 13"></polyline>
                        </svg>
                        Analytics
                    </a>
                </li>
                
                <li>
                    <a href="learn.html" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                        </svg>
                        Learn
                    </a>
                </li>
                
                <li>
                    <a href="compare.html" class="nav-item">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                            <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                        </svg>
                        Compare
                    </a>
                </li>

                        </svg>
                        Admin

            <div class="sidebar-footer">
                <a href="settings.html" class="bottom-link">
                    <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>

            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
    <div class="search-bar">
        <svg class="ui-icon" style="color: #7f8c8d;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search">
    </div>
    <div class="user-profile">
        <span class="notification">
            <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
        </span>
        <span class="language">English ▾</span>
        <div class="avatar-circle"></div>
        <div class="user-info">
            <span class="user-name">Ali</span>
            <span class="user-role">Admin</span>
        </div>
    </div>
</header>

            <div class="content-pages">
                <div class="section-header">
                    <h1>Dashboard</h1>
                </div>

                <div class="filter-bar">
    
    <div class="filter-group">
        <span class="filter-icon">
    <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
    </svg>
</span>
        <input type="text" class="filter-input" placeholder="Type a city name...">
    </div>

    <div class="filter-group">
        <span class="filter-icon">
    <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
    </svg>
</span>
        <select class="filter-select">
            <option value="7">Last 7 days</option>
            <option value="24">Last 24 hours</option>
            <option value="30">Last 30 days</option>
            <option value="365">Last 12 months</option>
        </select>
    </div>

    <div class="filter-group">
        <span class="filter-icon">
    <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
    </svg>
</span>
        <select class="filter-select">
            <option value="all">All pollutants</option>
            <option value="pm25">PM2.5 (Fine Particles)</option>
            <option value="pm10">PM10 (Coarse Particles)</option>
            <option value="no2">NO2 (Nitrogen Dioxide)</option>
            <option value="o3">O3 (Ozone)</option>
        </select>
    </div>
</div>

                <div class="node-grid">
                    <div class="node-card" style="grid-column: 1 / -1;"> <h3 style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                            <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                            </svg>
                            Air Quality Trend (Last 7 Days)
                        </h3>
                        <div style="height: 300px; width: 100%;">
                            <canvas id="aqiChart"></canvas>
                        </div>
                    </div>

                    <div class="node-card" style="grid-column: 1 / -1; margin-top: 20px;">
                        <h3 style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                            <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                                <line x1="9" y1="3" x2="9" y2="21"></line>
                                <line x1="15" y1="3" x2="15" y2="21"></line>
                            </svg>
                            Global Air Quality Heatmap
                        </h3>
                        <div id="map" style="height: 400px; width: 100%; border-radius: 8px; z-index: 1;"></div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- leaflet.js library pour la map -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
   
    <!-- chart.js library pour les graphes -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="dashboard.js"></script>

</body>
</html>
